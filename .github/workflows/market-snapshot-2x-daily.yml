name: Fetch market snapshot (2x daily)

on:
  schedule:
    # Same cadence as quotes-2x-daily.yml — see its comment for why this was
    # cut back from hourly.
    - cron: "0 4 * * 1-5" # ~12:00pm PHT (UTC+8)
    - cron: "30 8 * * 1-5" # ~4:30pm PHT (UTC+8), after the 3:30pm close settles
  workflow_dispatch: {}

jobs:
  fetch-market-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pseye/etl fetch-market-snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
