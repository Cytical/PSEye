name: Push DB schema

on:
  workflow_dispatch: {}

jobs:
  db-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pseye/etl migrate-db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
