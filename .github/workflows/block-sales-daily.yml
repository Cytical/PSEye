name: Fetch block sales

on:
  schedule:
    # ~9:30pm PHT (UTC+8) daily, after PSE publishes its Daily Quotation
    # Report (the EOD report block sales are extracted from) for the day.
    - cron: "30 13 * * *"
  workflow_dispatch: {}

jobs:
  fetch-block-sales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pseye/etl fetch-block-sales
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
