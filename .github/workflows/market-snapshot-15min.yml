name: Fetch market snapshot (every 15 min)

on:
  schedule:
    # Every 15 min, 9:00am-4:45pm PHT (UTC+8) on weekdays — same cadence and
    # same reasoning as quotes-15min.yml, including the :07/:22/:37/:52
    # offset (see that file's comment — avoids GitHub's exact-quarter-hour
    # scheduling congestion, confirmed live to cause multi-day silent gaps).
    - cron: "7,22,37,52 1-8 * * 1-5"
  workflow_dispatch: {}

jobs:
  fetch-market-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pseye/etl fetch-market-snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
