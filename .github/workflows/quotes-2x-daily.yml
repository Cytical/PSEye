name: Fetch quotes (2x daily)

on:
  schedule:
    # Weekdays only, twice a day: a midday check plus an after-close settle
    # run. Was hourly during the whole trading session; cut back to 2 runs/day
    # (down from 8) to stay well within GitHub Actions' free monthly minutes —
    # this was the single biggest contributor to running out mid-month.
    - cron: "0 4 * * 1-5" # ~12:00pm PHT (UTC+8)
    - cron: "30 8 * * 1-5" # ~4:30pm PHT (UTC+8), after the 3:30pm close settles
  workflow_dispatch: {}

jobs:
  fetch-quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pseye/etl fetch-quotes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
