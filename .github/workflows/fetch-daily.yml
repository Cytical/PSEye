name: Fetch daily (news, disclosures, corporate actions, historical quotes)

# One consolidated job (shared checkout/install) for the sources that are all
# available right after PSE's 3:30pm close: news (RSS, continuous),
# disclosures + corporate actions (PSE Edge, filed through the day), and
# historical quotes (PSE Edge's per-company chart feed, which has today's EOD
# close within its 15-min delay). Runs at 08:20 UTC (~4:20pm PHT) so the
# day's /daily/[date] recap is populated right after close — off the exact
# :15 quarter-hour GitHub flags as congested.
#
# Block sales is deliberately NOT here — it's extracted from PSE's Daily
# Quotation Report PDF, which PSE only publishes ~9:30pm PHT, so it has its
# own workflow (block-sales-daily.yml) at that later time. It still lands in
# the SAME Manila-day recap (block sales are keyed by the report's trade
# date), just filled in later in the evening.
#
# History: these five sources (plus a since-removed offerings step) used to be
# 6 separate workflows, several hourly — ~1,900 runs/month that blew past
# GitHub Actions' free minutes on the then-private repo. Consolidating to one
# daily job cut that dramatically; block sales was split back out 2026-07-21
# only because its source publishes hours later than the rest.
on:
  schedule:
    - cron: "20 8 * * *" # ~4:20pm PHT (UTC+8), daily
  workflow_dispatch: {}

jobs:
  fetch-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # continue-on-error on each step so one source having a bad day (PSE
      # Edge markup change, pse.com.ph's flaky WAF, etc.) doesn't skip the
      # rest — but that also hides the failure from the job's own status, so
      # each step gets an id and the "Fail job if any step failed" step below
      # re-surfaces it. Without that, GitHub's built-in failed-workflow email
      # (Settings > Notifications > Actions) would never fire.
      - id: news
        run: pnpm --filter @pseye/etl fetch-news
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - id: disclosures
        run: pnpm --filter @pseye/etl fetch-disclosures
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - id: corporateActions
        run: pnpm --filter @pseye/etl fetch-corporate-actions
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - id: historicalQuotes
        run: pnpm --filter @pseye/etl fetch-historical-quotes
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Fail job if any step failed
        if: always()
        run: |
          for outcome in \
            "${{ steps.news.outcome }}" \
            "${{ steps.disclosures.outcome }}" \
            "${{ steps.corporateActions.outcome }}" \
            "${{ steps.historicalQuotes.outcome }}"; do
            if [ "$outcome" = "failure" ]; then
              echo "At least one fetch step failed — see step logs above."
              exit 1
            fi
          done
